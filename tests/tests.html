<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Available Examinations | Testify</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="../dashboard/dashboard.css">
    <link rel="icon" type="image/png" sizes="32x32" href="../logo.png">
    <link rel="icon" type="image/png" sizes="16x16" href="../logo.png">
    <link rel="apple-touch-icon" href="../logo.png">
    <link rel="manifest" href="../manifest.json">
    <link rel="stylesheet" href="tests.css">
    <link rel="stylesheet" href="../mobile/mobile.css">
    <script src="../mobile/mobile.js"></script>
</head>
<body class="dashboard-body">
    <div id="sidebar-overlay" class="sidebar-overlay"></div>
    <aside class="sidebar glass">
        <div class="sidebar-header">
            <i class="ph ph-atom logo-icon"></i> <span class="logo-text">Testify</span>
        </div>
        <ul class="nav-menu">
            <li onclick="window.location.href='../dashboard/dashboard.html'"><i class="ph ph-squares-four"></i> Dashboard</li>
            <li class="active"><i class="ph ph-exam"></i> Tests</li>
            <li onclick="window.location.href='../leaderboard/leaderboard.html'"><i class="ph ph-trophy"></i> Leaderboard</li>
        </ul>
    </aside>

    <main class="main-content">
        <header class="topbar glass">
            <button id="mobile-menu-btn" class="hamburger-btn" aria-label="Toggle Menu">
                <i class="ph ph-list"></i>
            </button>
            <div class="greeting">
                <h1>Examinations</h1>
                <p class="subtitle">Select a scheduled test or review your performance.</p>
            </div>
        </header>

        <section id="tests-container" class="tests-grid">
            <!-- Render Skeletons on Boot -->
            <div class="test-skeleton card glass"></div>
            <div class="test-skeleton card glass"></div>
        </section>
        
        <section class="history-section">
            <h2><i class="ph ph-clock-counter-clockwise"></i> Personal Attempt History</h2>
            <div class="table-container glass">
                <table class="history-table">
                    <thead>
                        <tr>
                            <th>Exam Details</th>
                            <th>Completion Date</th>
                            <th>Score Achievement</th>
                            <th>Accuracy Profile</th>
                            <th>Test Time</th>
                        </tr>
                    </thead>
                    <tbody id="history-table-body">
                        <tr><td colspan="5" style="text-align:center; color:var(--text-muted);">Awaiting repository synchronization...</td></tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>
    <script type="module" src="tests.js"></script>
</body>
</html>
