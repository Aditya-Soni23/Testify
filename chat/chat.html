<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Chat Terminal | Testify</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="../mobile/mobile.css">
    <script src="../mobile/mobile.js"></script>
    <link rel="manifest" href="/manifest.json">
    <link rel="stylesheet" href="chat.css">
</head>
<body class="dashboard-body">
    <div class="diamond-signature">
        <img src="/logo.png" alt="Diamond Logo">
        <span>Built by <strong>DIAMOND</strong></span>
    </div>
    
    <div id="sidebar-overlay" class="sidebar-overlay"></div>
    <aside class="sidebar glass">
        <div class="sidebar-header"><i class="ph ph-atom logo-icon"></i> <span class="logo-text">Testify</span></div>
        <ul class="nav-menu">
            <li id="nav-dashboard"><i class="ph ph-squares-four"></i> Dashboard</li>
            <li id="nav-tests"><i class="ph ph-exam"></i> Tests</li>
            <li id="nav-polling"><i class="ph ph-chart-bar"></i> Polling</li>
            <li id="nav-upload"><i class="ph ph-upload"></i> Upload</li>
            <li class="active" id="nav-chat"><i class="ph ph-chats-circle"></i> Chat</li>
        </ul>
    </aside>

    <main class="main-content chat-workspace">
        <div class="chat-container glass">
            <!-- Header Grid Area -->
            <header class="chat-header">
                <button id="mobile-menu-btn" class="hamburger-btn" aria-label="Toggle Menu">
                    <i class="ph ph-list"></i>
                </button>
                <div style="display:flex; align-items:center; gap:0.75rem;">
                    <i class="ph ph-planet" style="font-size:1.75rem; color:var(--accent-purple)"></i>
                    <div>
                        <h3>Testify Chat</h3>
                        <p style="font-size:0.8rem; color:var(--text-muted)">Realtime network</p>
                    </div>
                </div>
            </header>

            <!-- Message Streaming Core Viewport -->
            <div id="chat-messages-viewport" class="chat-viewport"></div>

            <!-- Contextual Reply Indicator Window Component -->
            <div id="reply-context-tracker" class="reply-bar hidden">
                <span id="reply-text-preview">Welcome!</span>
                <button id="cancel-reply-btn" class="close-reply-btn"><i class="ph ph-x"></i></button>
            </div>

            <!-- Control Bar Form Elements Input Area -->
            <footer class="chat-footer-form">
                <form id="chat-message-form">
                    <button type="button" class="action-emoji-btn" id="emoji-trigger"><i class="ph ph-smiley"></i></button>
                    <input type="text" id="msg-input" placeholder="Type message (Max 400 Characters)..." maxlength="400" autocomplete="off" required>
                    <button type="submit" class="send-message-btn"><i class="ph ph-paper-plane-right"></i></button>
                </form>
                <div id="emoji-picker-container" class="emoji-tray hidden">
                    <span class="emoji-opt">👍</span><span class="emoji-opt">🔥</span><span class="emoji-opt">💡</span>
                    <span class="emoji-opt">💯</span><span class="emoji-opt">🚀</span><span class="emoji-opt">🤔</span>
                </div>
            </footer>
        </div>
    </main>
    <script type="module" src="chat.js"></script>
</body>
</html>
